services:
  script-manager:
    build:
      context: https://github.com/fruitcake514/script-manager.git
    container_name: script-manager
    environment:
      - PUID=xxx
      - PGID=xxx
    ports:
      - "9999:8080"
      - "10000-10010:10000-10010"
    volumes:
      - ./scripts:/scripts
      - ./data:/app/data
    restart: unless-stopped
